<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancora Insieme — Segnala Partita</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f4f4;font-family:'Barlow',sans-serif;color:#2d2d2d;min-height:100vh}
header{background:#1e1e1e;border-bottom:3px solid #c8d400;padding:14px 20px;display:flex;align-items:center;gap:12px}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:.5px}
.logo-sub{font-size:11px;color:#aaa;margin-top:2px}
.logo-sub span{color:#c8d400;font-weight:700}
main{max-width:680px;margin:24px auto;padding:0 16px 48px}
.field-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:13px;color:#2d2d2d;background:#fff;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#a0b000}
.top-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:1.2rem}
@media(max-width:500px){.top-grid{grid-template-columns:1fr 1fr}}

/* TAVOLO */
.tavolo{background:#d8d8d8;border-radius:10px;border:3px solid #b0b0b0;padding:8px;margin-bottom:1.2rem}
.combo-row{display:flex;gap:8px;margin-bottom:7px}
.combo-slot{flex:1}
.combo-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;text-align:center;font-weight:700}
.combo-label.b{color:rgba(100,150,216,.8)}
.combo-label.r{color:rgba(216,100,100,.8)}
.combo-slot select{font-size:11px;padding:5px 7px;border-radius:6px;font-family:inherit}
.combo-slot.b select{border:1px solid rgba(100,150,216,.5);background:#1a2d5a;color:#a0c0ff}
.combo-slot.b select option{background:#0d1b3e;color:#fff}
.combo-slot.r select{border:1px solid rgba(216,100,100,.5);background:#5a1a1a;color:#ffaaaa}
.combo-slot.r select option{background:#3e0d0d;color:#fff}
.campo-row{display:flex;align-items:stretch;gap:5px}
.gol-panel{width:54px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:rgba(0,0,0,.15);border-radius:7px;padding:7px 4px}
.gol-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;text-align:center;font-weight:700}
.gol-lbl.r{color:#d86464}
.gol-lbl.b{color:#6496d8}
.gol-inp{width:46px;text-align:center;font-size:22px;font-weight:800;padding:4px 2px;background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.2);color:#fff;border-radius:5px;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif}
.gol-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.svg-wrap{flex:1;min-width:0}
svg.campo{width:100%;display:block}
.ris-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:7px;font-size:12px;color:rgba(255,255,255,.5)}
.ris-val{font-size:18px;font-weight:800;font-family:'Barlow Condensed',sans-serif}
.ris-val.r{color:#d86464}
.ris-val.b{color:#6496d8}
.ris-ok{color:#c8d400;font-size:11px}
.ris-err{color:#ff6b6b;font-size:11px}
.note-area{margin-bottom:12px}
.btn-invia{width:100%;padding:14px;background:#1e1e1e;color:#c8d400;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-invia:hover{background:#333}
.btn-invia:disabled{opacity:.5;cursor:not-allowed}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-warn{background:#fff8e1;border:1px solid #f9a825;color:#7a5c00}
.alert-err{background:#ffebee;border:1px solid #c62828;color:#c62828}
.alert-ok{background:#e8f5e9;border:1px solid #2e7d32;color:#2e7d32}
#successPanel{display:none;text-align:center;padding:40px 24px;background:#fff;border-radius:10px;border:1px solid #e0e0e0}
#successPanel .big{font-size:56px;margin-bottom:12px}
#successPanel h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:#2e7d32;margin-bottom:8px}
#successPanel p{color:#888;font-size:14px;margin-bottom:20px}
.btn-altra{padding:10px 24px;background:#c8d400;color:#1e1e1e;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-title">Ancora Insieme — Segnala Partita</div>
    <div class="logo-sub">BLM Group · Torneo Calcetto · <span>v2.6</span></div>
  </div>
</header>
<main>

<div id="successPanel">
  <div class="big">⚽</div>
  <h2>Segnalazione Inviata</h2>
  <p id="successMsg">La segnalazione è stata inviata al Direttore di Torneo.</p>
  <button class="btn-altra" onclick="resetForm()">Segnala un'altra partita</button>
</div>

<div id="formPanel">
  <div id="alertBox" class="alert"></div>

  <!-- TOP -->
  <div class="top-grid">
    <div><label class="field-label">Chi segnala</label><input type="text" id="segnalatore" placeholder="Rossi Mario" autocomplete="name"></div>
    <div><label class="field-label">Email</label><input type="email" id="emailSegnalatore" placeholder="mario@blmgroup.com" autocomplete="email"></div>
    <div><label class="field-label">Data gara</label><input type="date" id="dataGara"></div>
    <div><label class="field-label">Ora gara</label><input type="time" id="oraGara"></div>
  </div>

  <!-- TAVOLO -->
  <div class="tavolo">

    <!-- BLU sopra -->
    <div class="combo-row">
      <div class="combo-slot b"><div class="combo-label b">🔵 giocatore 1</div><select id="blu1" onchange="aggiorna()"><option value="">— seleziona —</option></select></div>
      <div class="combo-slot b"><div class="combo-label b">🔵 giocatore 2</div><select id="blu2" onchange="aggiorna()"><option value="">— seleziona —</option></select></div>
    </div>

    <div class="campo-row">
      <!-- GOL ROSSI sx -->
      <div class="gol-panel">
        <div class="gol-lbl r">Gol<br>Rossi</div>
        <input type="number" class="gol-inp" id="golRossi" value="0" min="0" max="30" oninput="aggiorna()">
      </div>

      <!-- CAMPO SVG -->
      <div class="svg-wrap">
        <svg class="campo" viewBox="0 0 420 180" xmlns="http://www.w3.org/2000/svg">
          <rect width="420" height="180" fill="#2d6b27" rx="3"/>
          <rect x="0"   y="0" width="53"  height="180" fill="#296022"/>
          <rect x="105" y="0" width="53"  height="180" fill="#296022"/>
          <rect x="210" y="0" width="53"  height="180" fill="#296022"/>
          <rect x="315" y="0" width="53"  height="180" fill="#296022"/>
          <rect x="3" y="3" width="414" height="174" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5" rx="2"/>
          <line x1="210" y1="3" x2="210" y2="177" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
          <circle cx="210" cy="90" r="30" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
          <circle cx="210" cy="90" r="2.5" fill="rgba(255,255,255,.6)"/>
          <rect x="3"   y="55" width="45" height="70" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
          <rect x="372" y="55" width="45" height="70" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
          <rect x="0"   y="70" width="7" height="40" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
          <rect x="413" y="70" width="7" height="40" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
          <!-- R1 portiere rosso -->
          <line x1="25" y1="0" x2="25" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="25" cy="90" rx="8" ry="11" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <line x1="25" y1="79" x2="25" y2="70" stroke="#e88a8a" stroke-width="1.5"/>
          <line x1="21" y1="83" x2="29" y2="83" stroke="#e88a8a" stroke-width="1.5"/>
          <!-- R2 difensori rossi -->
          <line x1="78" y1="0" x2="78" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="78" cy="52"  rx="7" ry="9" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="78" cy="128" rx="7" ry="9" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <!-- B3 attaccanti blu -->
          <line x1="131" y1="0" x2="131" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="131" cy="42"  rx="7" ry="9" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="131" cy="90"  rx="7" ry="9" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="131" cy="138" rx="7" ry="9" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <!-- R5 centrocampisti rossi -->
          <line x1="165" y1="0" x2="165" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="165" cy="20"  rx="6" ry="8" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="165" cy="56"  rx="6" ry="8" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="165" cy="90"  rx="6" ry="8" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="165" cy="124" rx="6" ry="8" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="165" cy="160" rx="6" ry="8" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <!-- B5 centrocampisti blu -->
          <line x1="255" y1="0" x2="255" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="255" cy="20"  rx="6" ry="8" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="255" cy="56"  rx="6" ry="8" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="255" cy="90"  rx="6" ry="8" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="255" cy="124" rx="6" ry="8" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="255" cy="160" rx="6" ry="8" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <!-- R3 attaccanti rossi -->
          <line x1="289" y1="0" x2="289" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="289" cy="42"  rx="7" ry="9" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="289" cy="90"  rx="7" ry="9" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <ellipse cx="289" cy="138" rx="7" ry="9" fill="#8a1a1a" stroke="#d86464" stroke-width="1.5"/>
          <!-- B2 difensori blu -->
          <line x1="342" y1="0" x2="342" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="342" cy="52"  rx="7" ry="9" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <ellipse cx="342" cy="128" rx="7" ry="9" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <!-- B1 portiere blu -->
          <line x1="395" y1="0" x2="395" y2="180" stroke="rgba(220,180,140,.45)" stroke-width="2"/>
          <ellipse cx="395" cy="90" rx="8" ry="11" fill="#1a3a8a" stroke="#6496d8" stroke-width="1.5"/>
          <line x1="395" y1="79" x2="395" y2="70" stroke="#8ab0e8" stroke-width="1.5"/>
          <line x1="391" y1="83" x2="399" y2="83" stroke="#8ab0e8" stroke-width="1.5"/>
          <!-- pallone -->
          <circle cx="210" cy="90" r="6" fill="white" opacity=".9"/>
        </svg>
      </div>

      <!-- GOL BLU dx -->
      <div class="gol-panel">
        <div class="gol-lbl b">Gol<br>Blu</div>
        <input type="number" class="gol-inp" id="golBlu" value="0" min="0" max="30" oninput="aggiorna()">
      </div>
    </div>

    <!-- ROSSA sotto -->
    <div class="combo-row" style="margin-top:7px;margin-bottom:0">
      <div class="combo-slot r"><div class="combo-label r">🔴 giocatore 1</div><select id="rossi1" onchange="aggiorna()"><option value="">— seleziona —</option></select></div>
      <div class="combo-slot r"><div class="combo-label r">🔴 giocatore 2</div><select id="rossi2" onchange="aggiorna()"><option value="">— seleziona —</option></select></div>
    </div>

    <!-- RISULTATO LIVE -->
    <div class="ris-row">
      <span class="ris-val r" id="liveR">0</span>
      <span>—</span>
      <span class="ris-val b" id="liveB">0</span>
      <span id="liveMsg"></span>
    </div>

  </div>

  <!-- NOTE -->
  <div class="note-area">
    <label class="field-label">Note (facoltativo)</label>
    <textarea id="note" rows="2" placeholder="Segnala qualcosa di insolito…"></textarea>
  </div>

  <!-- INVIO -->
  <button class="btn-invia" id="btnInvia" onclick="invia()">Invia Segnalazione →</button>
</div>

</main>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkT9oftsq83X3hnK1cUL5S8UIQrme1VpyJFCPC6oQNeUubCBPmO3eo6R5RnEpah7aMjQ/exec';
const GIOCATORI_JSON_URL = './giocatori.json';
const GIOCATORI_FALLBACK = {"giocatori":[{"nome":"Andrea","sede":"Levico"},{"nome":"Archimede","sede":"Levico"},{"nome":"Baraldo Andrea","sede":"Cant\u00f9"},{"nome":"Bassettoni","sede":"Levico"},{"nome":"Carcarlo Pravettoni","sede":"Levico"},{"nome":"Carlo","sede":"Levico"},{"nome":"Claudio","sede":"Levico"},{"nome":"Claudio T","sede":"Levico"},{"nome":"Cojocaru Dan","sede":"Cant\u00f9"},{"nome":"Enrico","sede":"Levico"},{"nome":"Franco","sede":"Levico"},{"nome":"Gemingnani Roberto","sede":"Cant\u00f9"},{"nome":"Giacomo","sede":"Levico"},{"nome":"Ivan","sede":"Levico"},{"nome":"Lucia","sede":"Levico"},{"nome":"Matteo","sede":"Levico"},{"nome":"Mirko","sede":"Levico"},{"nome":"Paolo","sede":"Levico"},{"nome":"Pittioni Alberto","sede":"Cant\u00f9"},{"nome":"Ratti Roberto","sede":"Cant\u00f9"},{"nome":"Simone","sede":"Levico"},{"nome":"Simone Dell\u2019oro","sede":"Levico"},{"nome":"Sonia","sede":"Levico"}]};

let giocatori = [];
let partiteEsistenti = [];

document.addEventListener('DOMContentLoaded', () => {
  impostaOggi();
  caricaGiocatori();
  const n = localStorage.getItem('ai_segnalatore');
  const e = localStorage.getItem('ai_email');
  if (n) document.getElementById('segnalatore').value = n;
  if (e) document.getElementById('emailSegnalatore').value = e;
});

function impostaOggi() {
  const d = new Date(), p = x => x.toString().padStart(2,'0');
  document.getElementById('dataGara').value = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
  document.getElementById('oraGara').value = `${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function caricaGiocatori() {
  let dati = null;
  try { const r = await fetch(GIOCATORI_JSON_URL); if (r.ok) dati = await r.json(); } catch {}
  if (!dati) dati = GIOCATORI_FALLBACK;
  if (dati.giocatori && Array.isArray(dati.giocatori)) {
    giocatori = dati.giocatori.map(g => typeof g === 'object' ? g.nome : g).sort();
    partiteEsistenti = dati.partite || [];
  }
  popolaCombo();
}

function popolaCombo() {
  ['blu1','blu2','rossi1','rossi2'].forEach(id => {
    const s = document.getElementById(id);
    const c = s.value;
    s.innerHTML = '<option value="">— seleziona —</option>' + giocatori.map(g => `<option value="${g}">${g}</option>`).join('');
    if (c) s.value = c;
  });
}

function valRis(gb, gr) {
  if (gb === gr) return 'Pareggi non ammessi';
  const mx = Math.max(gb,gr), mn = Math.min(gb,gr);
  if (mx < 10) return 'Vittoria a 10 gol';
  if (mx === 10 && mn === 9) return 'Scarto minimo 2 gol';
  if (mx > 10 && (mx-mn) !== 2) return 'Scarto esatto 2 oltre il 10';
  return null;
}

function aggiorna() {
  const gb = parseInt(document.getElementById('golBlu').value)||0;
  const gr = parseInt(document.getElementById('golRossi').value)||0;
  document.getElementById('liveR').textContent = gr;
  document.getElementById('liveB').textContent = gb;
  const m = document.getElementById('liveMsg');
  if (!gb && !gr) { m.innerHTML = ''; return; }
  const e = valRis(gb, gr);
  m.innerHTML = e ? `<span class="ris-err">${e}</span>` : `<span class="ris-ok">✓ valido</span>`;
}

function mostraAlert(cls, txt) {
  const el = document.getElementById('alertBox');
  el.className = 'alert ' + cls + ' show';
  el.textContent = txt;
}

function validaTutto() {
  let ok = true;
  if (!document.getElementById('segnalatore').value.trim()) { mostraAlert('alert-err','Inserisci il tuo nome.'); return false; }
  const em = document.getElementById('emailSegnalatore').value.trim();
  if (!em || !/^[^@]+@[^@]+\.[^@]+$/.test(em)) { mostraAlert('alert-err','Inserisci un\'email valida.'); return false; }
  if (!document.getElementById('dataGara').value) { mostraAlert('alert-err','Inserisci la data della gara.'); return false; }
  if (!document.getElementById('oraGara').value) { mostraAlert('alert-err','Inserisci l\'ora della gara.'); return false; }
  const vals = ['blu1','blu2','rossi1','rossi2'].map(id => document.getElementById(id).value);
  if (vals.some(v => !v)) { mostraAlert('alert-err','Seleziona tutti e 4 i giocatori.'); return false; }
  if (new Set(vals).size < 4) { mostraAlert('alert-err','I 4 giocatori devono essere distinti.'); return false; }
  const gb = parseInt(document.getElementById('golBlu').value)||0;
  const gr = parseInt(document.getElementById('golRossi').value)||0;
  const errRis = valRis(gb, gr);
  if (errRis) { mostraAlert('alert-err', errRis); return false; }
  return true;
}

async function invia() {
  // Barriera doppio click
  const btn = document.getElementById('btnInvia');
  if (btn.disabled) return;
  if (!validaTutto()) return;

  btn.disabled = true;
  btn.textContent = 'Invio in corso…';

  localStorage.setItem('ai_segnalatore', document.getElementById('segnalatore').value.trim());
  localStorage.setItem('ai_email', document.getElementById('emailSegnalatore').value.trim());

  const campi = {
    segnalatore: document.getElementById('segnalatore').value.trim(),
    emailSegnalatore: document.getElementById('emailSegnalatore').value.trim(),
    dataGara: document.getElementById('dataGara').value,
    oraGara: document.getElementById('oraGara').value,
    blu1: document.getElementById('blu1').value,
    blu2: document.getElementById('blu2').value,
    golBlu: parseInt(document.getElementById('golBlu').value)||0,
    golRossi: parseInt(document.getElementById('golRossi').value)||0,
    rossi1: document.getElementById('rossi1').value,
    rossi2: document.getElementById('rossi2').value,
    note: document.getElementById('note').value.trim(),
  };

  try {
    // fetch con mode no-cors — gli errori di rete vengono catturati
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(campi).toString()
    });

    // Mostra successo solo se fetch non ha lanciato eccezioni di rete
    document.getElementById('formPanel').style.display = 'none';
    const sp = document.getElementById('successPanel');
    sp.style.display = 'block';
    const dg = campi.dataGara.split('-').reverse().join('/');
    document.getElementById('successMsg').innerHTML =
      `📅 ${dg} alle ${campi.oraGara}<br><br>` +
      `🔵 ${campi.blu1} + ${campi.blu2}<br>` +
      `<strong style="font-size:1.3em">${campi.golBlu} – ${campi.golRossi}</strong><br>` +
      `🔴 ${campi.rossi1} + ${campi.rossi2}<br><br>` +
      `Il Direttore di Torneo la validerà a breve.`;

  } catch (error) {
    btn.disabled = false;
    btn.textContent = 'Invia Segnalazione →';
    mostraAlert('alert-err', 'Errore di connessione. Controlla la rete e riprova.');
  }
}

function resetForm() {
  document.getElementById('successPanel').style.display = 'none';
  document.getElementById('formPanel').style.display = 'block';
  document.getElementById('btnInvia').disabled = false;
  document.getElementById('btnInvia').textContent = 'Invia Segnalazione →';
  document.getElementById('alertBox').className = 'alert';
  document.getElementById('alertBox').textContent = '';
  ['blu1','blu2','rossi1','rossi2','note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('golBlu').value = '0';
  document.getElementById('golRossi').value = '0';
  document.getElementById('liveMsg').innerHTML = '';
  document.getElementById('liveR').textContent = '0';
  document.getElementById('liveB').textContent = '0';
  impostaOggi();
}
