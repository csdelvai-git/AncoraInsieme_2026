<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Andamento ELO per Giornata — Levico</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#1a1a1a;color:#f0f0f0;font-family:'Barlow',sans-serif}
.header{background:#111;border-bottom:3px solid #c8d400}
.header img{width:100%;max-height:140px;object-fit:contain;background:#1a2a1a;display:block}
.header-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:16pt;font-weight:800;color:#c8d400}
.header-sub{font-size:9pt;color:#888}
.main{padding:16px;max-width:960px;margin:0 auto}
.chart-wrap{background:#f8f8f8;border-radius:10px;padding:12px 8px 8px;margin-bottom:12px}
canvas{display:block;width:100%}
.legenda{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.footer{text-align:center;font-size:8pt;color:#555;padding:16px;border-top:1px solid #333;margin-top:16px}
</style></head><body>
<div class="header">
<img src="https://raw.githubusercontent.com/csdelvai-git/AncoraInsieme_2026/main/AncoraInsieme.png" alt="Ancora Insieme">
<div class="header-bar">
<div class="header-title">Andamento ELO per Giornata — Levico</div>
<div class="header-sub">Aggiornato il: 14/07/2026, 01:41</div>
</div></div>
<div class="main">
<div class="chart-wrap"><canvas id="gc" height="320"></canvas></div>
<div class="legenda" id="leg"></div>
</div>
<div class="footer">Powered by Claudio S. Delvai, Direttore di Torneo — ancorainsieme.ddt@gmail.com</div>
<script>
const datasets=[{"nome":"Delvai Claudio S.","eloPerData":{"18/06":1572,"19/06":1553,"06/07":1568},"color":"#c8d400"}];
const date=["18/06","19/06","06/07"];
function hexRgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}
const leg=document.getElementById('leg');
datasets.forEach(d=>{const el=document.createElement('div');el.className='leg-item';el.style.cssText=`background:${hexRgba(d.color,0.12)};border:1px solid ${hexRgba(d.color,0.4)};color:${d.color}`;el.innerHTML=`<span style="width:10px;height:3px;background:${d.color};border-radius:2px;display:inline-block"></span>${d.nome}`;leg.appendChild(el);});
const canvas=document.getElementById('gc');
const dpr=window.devicePixelRatio||1;
const W=canvas.parentElement.clientWidth-20,H=320;
canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
const allV=datasets.flatMap(d=>date.map(dd=>d.eloPerData[dd]).filter(Boolean));
const gMin=Math.min(...allV),gMax=Math.max(...allV);
const pad=Math.max(10,Math.round((gMax-gMin)*0.1));
const yMin=gMin-pad,yMax=gMax+pad,yRange=yMax-yMin||1;
const ml=52,mr=16,mt=14,mb=40,pw=W-ml-mr,ph=H-mt-mb;
const cx=i=>ml+(i/(date.length-1||1))*pw;
const cy=v=>mt+ph-((v-yMin)/yRange)*ph;
ctx.clearRect(0,0,W,H);
const step=Math.ceil((gMax-gMin)/5/10)*10||10;
ctx.font='10px Barlow Condensed,sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
for(let v=Math.ceil(yMin/step)*step;v<=yMax;v+=step){const y=cy(v);ctx.beginPath();ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.moveTo(ml,y);ctx.lineTo(ml+pw,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#999';ctx.fillText(v,ml-5,y);}
ctx.font='9px Barlow,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
date.forEach((d,i)=>{const x=cx(i);ctx.beginPath();ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#aaa';ctx.fillText(d,x,mt+ph+5);});
ctx.beginPath();ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;ctx.setLineDash([]);ctx.moveTo(ml,mt);ctx.lineTo(ml,mt+ph);ctx.lineTo(ml+pw,mt+ph);ctx.stroke();
datasets.forEach(ds=>{
const color=ds.color;
const punti=date.map((d,i)=>{let v=ds.eloPerData[d];if(v===undefined){const p=date.slice(0,i).reverse().find(dd=>ds.eloPerData[dd]!==undefined);v=p?ds.eloPerData[p]:1500;}return{x:cx(i),y:cy(v),v,hasData:ds.eloPerData[d]!==undefined};});
ctx.beginPath();punti.forEach((p,j)=>j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.lineTo(punti[punti.length-1].x,mt+ph);ctx.lineTo(punti[0].x,mt+ph);ctx.closePath();ctx.fillStyle=hexRgba(color,0.06);ctx.fill();
ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';punti.forEach((p,j)=>j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
punti.forEach(p=>{if(!p.hasData)return;ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
const last=punti[punti.length-1];ctx.font='bold 10px Barlow Condensed,sans-serif';ctx.fillStyle=color;ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText(last.v,last.x-6,last.y-4);
});
</script></body></html>
